<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gallery | Grade 7 Paterno</title>
    <style>
        /* CSS STYLES - SAME THEME AS INDEX */
        :root {
            --primary-blue: #0b1d42; 
            --accent-yellow: #fff04b; 
            --text-light: #f4f6f9;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--primary-blue);
            color: var(--text-light);
            margin: 0;
            padding: 0;
            line-height: 1.6;
        }

        /* Header Section */
        header {
            background-color: var(--accent-yellow);
            color: #333;
            text-align: center;
            padding: 10px 20px;
            font-weight: bold;
            font-size: 0.9em;
            position: relative;
            z-index: 10;
        }

        /* Menu & Sidebar */
        .menu-bar {
            padding: 15px 20px 0 20px;
            background-color: var(--primary-blue);
            display: flex;
            align-items: center;
        }

        .menu-icon {
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            width: 24px;
            height: 18px;
            cursor: pointer;
            transition: transform 0.3s ease;
        }

        .menu-icon span {
            display: block;
            width: 100%;
            height: 2px;
            background-color: var(--text-light);
            border-radius: 2px;
            transition: all 0.3s ease;
        }

        .sidebar {
            position: fixed;
            top: 0;
            left: -280px; 
            width: 250px;
            height: 100%;
            background-color: #081530; 
            box-shadow: 2px 0 10px rgba(0, 0, 0, 0.5);
            z-index: 9999;
            transition: left 0.4s cubic-bezier(0.25, 0.8, 0.25, 1); 
            padding-top: 20px;
            overflow-y: auto;
        }

        .sidebar.active {
            left: 0; 
        }

        .sidebar .close-btn {
            font-size: 24px;
            color: var(--text-light);
            margin-left: 20px;
            margin-bottom: 20px;
            cursor: pointer;
            display: inline-block;
        }

        .sidebar-links {
            list-style: none;
            padding: 0;
            margin: 0;
        }

        .sidebar-links li a {
            display: block;
            color: var(--text-light);
            text-decoration: none;
            padding: 12px 20px 12px 30px;
            font-size: 1.05em;
        }

        /* Hero Section */
        .hero {
            text-align: center;
            padding: 25px 20px 40px 20px; 
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }

        .hero h1 {
            margin: 0;
            font-size: 2.2em;
            letter-spacing: 1px;
        }

        .hero p {
            color: #cccccc;
            margin-top: 5px;
            font-size: 0.9em;
        }

        /* Container */
        .container {
            max-width: 900px;
            margin: 0 auto;
            padding: 30px 15px; 
        }

        /* --- ALBUM GRID (Mga Folders/Covers) --- */
        .album-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr); /* 2 Albums kada row sa simula */
            gap: 20px; 
            margin-bottom: 50px;
        }

        .album-card {
            background-color: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 8px;
            overflow: hidden;
            cursor: pointer;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            text-align: center;
        }

        .album-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.5);
            border-color: var(--accent-yellow);
        }

        .album-cover {
            width: 100%;
            height: 150px;
            object-fit: cover;
            border-bottom: 3px solid var(--accent-yellow);
        }

        .album-title {
            padding: 15px 10px;
            font-size: 1em;
            font-weight: bold;
            color: var(--text-light);
        }

        .album-count {
            display: block;
            font-size: 0.75em;
            color: #aaa;
            margin-top: 3px;
            font-weight: normal;
        }

        /* --- PHOTO GRID (Loob ng Album - 3 KADA ROW) --- */
        .photo-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr); /* STRICTLY 3 PHOTOS KADA ROW */
            gap: 10px; /* Pinaliit ang gap para magkasya ang tatlo nang maayos */
            margin-bottom: 50px;
        }

        .photo-item {
            width: 100%;
            height: 110px; /* Sakto lang na height para sa 3 columns */
            object-fit: cover;
            border-radius: 4px;
            cursor: pointer;
            transition: transform 0.3s ease;
            box-shadow: 0 4px 8px rgba(0,0,0,0.3);
        }

        .photo-item:hover {
            transform: scale(1.05);
            z-index: 2;
        }

        /* --- NAVIGATION BUTTONS --- */
        .back-btn {
            background-color: transparent;
            color: var(--accent-yellow);
            border: 1px solid var(--accent-yellow);
            padding: 8px 20px;
            font-size: 0.9em;
            border-radius: 20px;
            cursor: pointer;
            margin-bottom: 20px;
            transition: all 0.3s ease;
            display: inline-flex;
            align-items: center;
        }

        .back-btn:hover {
            background-color: var(--accent-yellow);
            color: var(--primary-blue);
        }

        .section-title {
            font-size: 1.5em;
            color: var(--text-light);
            margin-bottom: 25px;
            text-transform: uppercase;
            letter-spacing: 1px;
            border-bottom: 1px solid rgba(255,255,255,0.1);
            padding-bottom: 10px;
        }

        /* Hide elements dynamically */
        .hidden {
            display: none !important;
        }

        /* --- LIGHTBOX (POP-UP PICTURE) --- */
        .lightbox {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.95);
            z-index: 10000;
            display: flex;
            justify-content: center;
            align-items: center;
            opacity: 0;
            visibility: hidden;
            transition: opacity 0.3s ease, visibility 0.3s ease;
        }

        .lightbox.show {
            opacity: 1;
            visibility: visible;
        }

        .lightbox-content img {
            max-width: 95%;
            max-height: 80vh; 
            border-radius: 4px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.5);
        }

        .lightbox-close {
            position: absolute;
            top: 20px;
            right: 30px;
            color: white;
            font-size: 40px;
            font-weight: bold;
            cursor: pointer;
            transition: color 0.3s;
            z-index: 10001;
        }

        .lightbox-close:hover {
            color: var(--accent-yellow);
        }

        body.no-scroll {
            overflow: hidden;
        }

        /* Footer */
        footer {
            text-align: center;
            padding: 30px 20px;
            background-color: #07132b;
            margin-top: 40px;
            font-size: 0.8em;
            color: #777;
        }
    </style>
</head>
<body>

    <header>
        Welcome to our Official Section Website! | S.Y. 2025-2026
    </header>

    <div class="menu-bar">
        <div class="menu-icon" id="menuToggle" title="Menu">
            <span></span>
            <span></span>
            <span></span>
        </div>
    </div>

    <div class="sidebar" id="sidebar">
        <div class="close-btn" id="closeBtn">&times;</div>
        <ul class="sidebar-links">
            <li><a href="index.html">Home</a></li>
            <li><a href="gallery.html">Gallery</a></li>
            <li><a href="about.html">About</a></li>
        </ul>
    </div>

    <div class="hero">
        <h1>PHOTO ALBUMS</h1>
        <p>Memories of Grade 7 Paterno</p>
    </div>

    <div class="container">
        
        <div id="albumListView" class="album-grid">
            
            <div class="album-card" onclick="openAlbum('album1', 'First Day of Classes')">
                <img src="photos/cover-firstday.jpg" alt="Cover" class="album-cover">
                <div class="album-title">First Day of Classes <span class="album-count">View Photos</span></div>
            </div>

            <div class="album-card" onclick="openAlbum('album2', 'Buwan ng Wika 2025')">
                <img src="photos/cover-wika.jpg" alt="Cover" class="album-cover">
                <div class="album-title">Buwan ng Wika <span class="album-count">View Photos</span></div>
            </div>

            <div class="album-card" onclick="openAlbum('album3', 'Intramurals Highlights')">
                <img src="photos/cover-intrams.jpg" alt="Cover" class="album-cover">
                <div class="album-title">Intramurals <span class="album-count">View Photos</span></div>
            </div>

            <div class="album-card" onclick="openAlbum('album4', 'Science Group Projects')">
                <img src="photos/cover-science.jpg" alt="Cover" class="album-cover">
                <div class="album-title">Science Group <span class="album-count">View Photos</span></div>
            </div>

            <div class="album-card" onclick="openAlbum('album5', 'Christmas Party 2025')">
                <img src="photos/cover-xmas.jpg" alt="Cover" class="album-cover">
                <div class="album-title">Christmas Party <span class="album-count">View Photos</span></div>
            </div>

        </div>


        <div id="photosView" class="hidden">
            <button class="back-btn" onclick="closeAlbum()">&#8592; Back to Albums</button>
            <h2 id="currentAlbumTitle" class="section-title">Album Name</h2>

            <div id="album1" class="photo-grid album-content hidden">
                <img src="photos/firstday1.jpg" class="photo-item">
                <img src="photos/firstday2.jpg" class="photo-item">
                <img src="photos/firstday3.jpg" class="photo-item">
                <img src="photos/firstday4.jpg" class="photo-item">
            </div>

            <div id="album2" class="photo-grid album-content hidden">
                <img src="photos/wika1.jpg" class="photo-item">
                <img src="photos/wika2.jpg" class="photo-item">
                <img src="photos/wika3.jpg" class="photo-item">
            </div>

            <div id="album3" class="photo-grid album-content hidden">
                <img src="photos/intrams1.jpg" class="photo-item">
                <img src="photos/intrams2.jpg" class="photo-item">
                <img src="photos/intrams3.jpg" class="photo-item">
                <img src="photos/intrams4.jpg" class="photo-item">
                <img src="photos/intrams5.jpg" class="photo-item">
            </div>

            <div id="album4" class="photo-grid album-content hidden">
                <img src="photos/science1.jpg" class="photo-item">
                <img src="photos/science2.jpg" class="photo-item">
                <img src="photos/science3.jpg" class="photo-item">
            </div>

            <div id="album5" class="photo-grid album-content hidden">
                <img src="photos/xmas1.jpg" class="photo-item">
                <img src="photos/xmas2.jpg" class="photo-item">
                <img src="photos/xmas3.jpg" class="photo-item">
                <img src="photos/xmas4.jpg" class="photo-item">
                <img src="photos/xmas5.jpg" class="photo-item">
                <img src="photos/xmas6.jpg" class="photo-item">
            </div>
        </div>

    </div>

    <footer>
         
    </footer>

    <div id="lightbox" class="lightbox">
        <span class="lightbox-close" id="lightboxClose">&times;</span>
        <div class="lightbox-content">
            <img id="lightboxImg" src="" alt="Enlarged Photo">
        </div>
    </div>

    <script>
        // --- MENU TOGGLE ---
        const menuToggle = document.getElementById('menuToggle');
        const sidebar = document.getElementById('sidebar');
        const closeBtn = document.getElementById('closeBtn');

        menuToggle.addEventListener('click', function() {
            sidebar.classList.add('active');
        });
        closeBtn.addEventListener('click', function() {
            sidebar.classList.remove('active');
        });

        // --- ALBUM NAVIGATION SYSTEM ---
        const albumListView = document.getElementById('albumListView');
        const photosView = document.getElementById('photosView');
        const currentAlbumTitle = document.getElementById('currentAlbumTitle');
        const allAlbumContents = document.querySelectorAll('.album-content');

        function openAlbum(albumId, albumName) {
            // Itago ang listahan ng mga album
            albumListView.classList.add('hidden');
            
            // Palitan ang title ng kung anong pinindot
            currentAlbumTitle.innerText = albumName;
            
            // Itago lahat ng photos muna, tapos i-show lang yung tamang album
            allAlbumContents.forEach(content => {
                content.classList.add('hidden');
            });
            document.getElementById(albumId).classList.remove('hidden');

            // Ipakita ang photo view at umakyat sa taas
            photosView.classList.remove('hidden');
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        function closeAlbum() {
            // Itago ang photo view at ibalik ang mga folders
            photosView.classList.add('hidden');
            albumListView.classList.remove('hidden');
        }

        // --- LIGHTBOX (PAMPALAKI NG PICTURE) ---
        const lightbox = document.getElementById('lightbox');
        const lightboxImg = document.getElementById('lightboxImg');
        const lightboxCloseBtn = document.getElementById('lightboxClose');
        const allPhotos = document.querySelectorAll('.photo-item');

        allPhotos.forEach(photo => {
            photo.addEventListener('click', function() {
                lightboxImg.src = this.src;
                lightbox.classList.add('show');
                document.body.classList.add('no-scroll');
            });
        });

        function closeLightbox() {
            lightbox.classList.remove('show');
            document.body.classList.remove('no-scroll');
        }

        lightboxCloseBtn.addEventListener('click', closeLightbox);
        lightbox.addEventListener('click', function(e) {
            if (e.target === lightbox) {
                closeLightbox();
            }
        });
    </script>
</body>
</html>
