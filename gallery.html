<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gallery | Grade 7 Paterno</title>
    <style>
        /* CSS STYLES - SAME THEME AS INDEX */
        :root {
            --primary-blue: #0b1d42; 
            --accent-yellow: #fff04b; 
            --text-light: #f4f6f9;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--primary-blue);
            color: var(--text-light);
            margin: 0;
            padding: 0;
            line-height: 1.6;
            /* FLEXBOX PARA MAPUNTA SA BABANG BABA ANG FOOTER LINE */
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        /* Header Section */
        header {
            background-color: var(--accent-yellow);
            color: #333;
            text-align: center;
            padding: 10px 20px;
            font-weight: bold;
            font-size: 0.9em;
            position: relative;
            z-index: 10;
        }

        /* Menu & Sidebar */
        .menu-bar {
            padding: 15px 20px 0 20px;
            background-color: var(--primary-blue);
            display: flex;
            align-items: center;
        }

        .menu-icon {
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            width: 24px;
            height: 18px;
            cursor: pointer;
            transition: transform 0.3s ease;
        }

        .menu-icon span {
            display: block;
            width: 100%;
            height: 2px;
            background-color: var(--text-light);
            border-radius: 2px;
            transition: all 0.3s ease;
        }

        .sidebar {
            position: fixed;
            top: 0;
            left: -280px; 
            width: 250px;
            height: 100%;
            background-color: #081530; 
            box-shadow: 2px 0 10px rgba(0, 0, 0, 0.5);
            z-index: 9999;
            transition: left 0.4s cubic-bezier(0.25, 0.8, 0.25, 1); 
            padding-top: 20px;
            overflow-y: auto;
        }

        .sidebar.active {
            left: 0; 
        }

        .sidebar .close-btn {
            font-size: 24px;
            color: var(--text-light);
            margin-left: 20px;
            margin-bottom: 20px;
            cursor: pointer;
            display: inline-block;
        }

        .sidebar-links {
            list-style: none;
            padding: 0;
            margin: 0;
        }

        .sidebar-links li a {
            display: block;
            color: var(--text-light);
            text-decoration: none;
            padding: 12px 20px 12px 30px;
            font-size: 1.05em;
        }

        /* Hero Section */
        .hero {
            text-align: center;
            padding: 25px 20px 40px 20px; 
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }

        .hero h1 {
            margin: 0;
            font-size: 2.2em;
            letter-spacing: 1px;
        }

        .hero p {
            color: #cccccc;
            margin-top: 5px;
            font-size: 0.9em;
        }

        /* Container */
        .container {
            max-width: 900px;
            margin: 0 auto;
            padding: 30px 15px; 
            flex: 1; /* PUSHES THE FOOTER DOWN */
            width: 100%;
            box-sizing: border-box;
        }

        /* --- ALBUM GRID --- */
        .album-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr); 
            gap: 20px; 
            margin-bottom: 50px;
        }

        .album-card {
            background-color: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 8px;
            overflow: hidden;
            cursor: pointer;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            text-align: center;
        }

        .album-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.5);
            border-color: var(--accent-yellow);
        }

        .album-cover {
            width: 100%;
            height: 150px;
            object-fit: cover;
            border-bottom: 3px solid var(--accent-yellow);
        }

        .album-title {
            padding: 15px 10px;
            font-size: 1em;
            font-weight: bold;
            color: var(--text-light);
        }

        .album-count {
            display: block;
            font-size: 0.75em;
            color: #aaa;
            margin-top: 3px;
            font-weight: normal;
        }

        /* --- PHOTO GRID --- */
        .photo-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr); 
            gap: 10px; 
            margin-bottom: 50px;
        }

        .photo-item {
            width: 100%;
            height: 110px; 
            object-fit: cover;
            border-radius: 4px;
            cursor: pointer;
            transition: transform 0.3s ease;
            box-shadow: 0 4px 8px rgba(0,0,0,0.3);
        }

        .photo-item:hover {
            transform: scale(1.05);
            z-index: 2;
        }

        /* --- MINIMALIST BACK ICON BUTTON --- */
        .back-btn {
            background-color: transparent;
            border: none;
            cursor: pointer;
            margin-bottom: 20px;
            transition: all 0.3s ease;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            padding: 8px;
            border-radius: 50%;
        }

        .back-btn svg {
            width: 32px;
            height: 32px;
            stroke: var(--accent-yellow);
            stroke-width: 2;
            fill: none;
            stroke-linecap: round;
            stroke-linejoin: round;
            transition: transform 0.3s ease;
        }

        .back-btn:hover {
            background-color: rgba(255, 255, 255, 0.05);
        }

        .back-btn:hover svg {
            transform: translateX(-3px); /* Gumagalaw patalikod nang kaunti pag tinapatan */
        }

        .section-title {
            font-size: 1.5em;
            color: var(--text-light);
            margin-bottom: 25px;
            text-transform: uppercase;
            letter-spacing: 1px;
            border-bottom: 1px solid rgba(255,255,255,0.1);
            padding-bottom: 10px;
        }

        .hidden {
            display: none !important;
        }

        /* --- LIGHTBOX (POP-UP PICTURE) --- */
        .lightbox {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.95);
            z-index: 10000;
            display: flex;
            justify-content: center;
            align-items: center;
            opacity: 0;
            visibility: hidden;
            transition: opacity 0.3s ease, visibility 0.3s ease;
        }

        .lightbox.show {
            opacity: 1;
            visibility: visible;
        }

        .lightbox-content img {
            max-width: 95%;
            max-height: 80vh; 
            border-radius: 4px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.5);
        }

        .lightbox-close {
            position: absolute;
            top: 20px;
            right: 30px;
            color: white;
            font-size: 40px;
            font-weight: bold;
            cursor: pointer;
            transition: color 0.3s;
            z-index: 10001;
        }

        .lightbox-close:hover {
            color: var(--accent-yellow);
        }

        body.no-scroll {
            overflow: hidden;
        }

        /* --- MINIMALIST BOTTOM BLUE LINE --- */
        footer {
            background-color: #07132b; /* Same blue color sa dating footer */
            height: 12px; /* Manipis na linya lang */
            width: 100%;
            margin-top: auto; /* Pinipilit na ibaba nang tuluyan */
        }
    </style>
</head>

    <script>
        const menuToggle = document.getElementById('menuToggle');
        const sidebar = document.getElementById('sidebar');
        const closeBtn = document.getElementById('closeBtn');

        menuToggle.addEventListener('click', function() {
            sidebar.classList.add('active');
        });
        closeBtn.addEventListener('click', function() {
            sidebar.classList.remove('active');
        });

        const albumListView = document.getElementById('albumListView');
        const photosView = document.getElementById('photosView');
        const currentAlbumTitle = document.getElementById('currentAlbumTitle');
        const allAlbumContents = document.querySelectorAll('.album-content');

        function openAlbum(albumId, albumName) {
            albumListView.classList.add('hidden');
            currentAlbumTitle.innerText = albumName;
            
            allAlbumContents.forEach(content => {
                content.classList.add('hidden');
            });
            document.getElementById(albumId).classList.remove('hidden');

            photosView.classList.remove('hidden');
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        function closeAlbum() {
            photosView.classList.add('hidden');
            albumListView.classList.remove('hidden');
        }

        const lightbox = document.getElementById('lightbox');
        const lightboxImg = document.getElementById('lightboxImg');
        const lightboxCloseBtn = document.getElementById('lightboxClose');
        const allPhotos = document.querySelectorAll('.photo-item');

        allPhotos.forEach(photo => {
            photo.addEventListener('click', function() {
                lightboxImg.src = this.src;
                lightbox.classList.add('show');
                document.body.classList.add('no-scroll');
            });
        });

        function closeLightbox() {
            lightbox.classList.remove('show');
            document.body.classList.remove('no-scroll');
        }

        lightboxCloseBtn.addEventListener('click', closeLightbox);
        lightbox.addEventListener('click', function(e) {
            if (e.target === lightbox || e.target.classList.contains('lightbox-content')) {
                closeLightbox();
            }
        });
    </script>
