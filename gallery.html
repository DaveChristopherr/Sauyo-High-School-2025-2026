<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gallery | Grade 7 Paterno</title>
    <style>
        /* CSS STYLES - SAME THEME AS INDEX */
        :root {
            --primary-blue: #0b1d42; 
            --accent-yellow: #fff04b; 
            --text-light: #f4f6f9;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--primary-blue);
            color: var(--text-light);
            margin: 0;
            padding: 0;
            line-height: 1.6;
        }

        /* Header Section */
        header {
            background-color: var(--accent-yellow);
            color: #333;
            text-align: center;
            padding: 10px 20px;
            font-weight: bold;
            font-size: 0.9em;
            position: relative;
            z-index: 10;
        }

        /* Menu & Sidebar */
        .menu-bar {
            padding: 15px 20px 0 20px;
            background-color: var(--primary-blue);
            display: flex;
            align-items: center;
        }

        .menu-icon {
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            width: 24px;
            height: 18px;
            cursor: pointer;
            transition: transform 0.3s ease;
        }

        .menu-icon span {
            display: block;
            width: 100%;
            height: 2px;
            background-color: var(--text-light);
            border-radius: 2px;
            transition: all 0.3s ease;
        }

        .sidebar {
            position: fixed;
            top: 0;
            left: -280px; 
            width: 250px;
            height: 100%;
            background-color: #081530; 
            box-shadow: 2px 0 10px rgba(0, 0, 0, 0.5);
            z-index: 9999;
            transition: left 0.4s cubic-bezier(0.25, 0.8, 0.25, 1); 
            padding-top: 20px;
            overflow-y: auto;
        }

        .sidebar.active {
            left: 0; 
        }

        .sidebar .close-btn {
            font-size: 24px;
            color: var(--text-light);
            margin-left: 20px;
            margin-bottom: 20px;
            cursor: pointer;
            display: inline-block;
        }

        .sidebar-links {
            list-style: none;
            padding: 0;
            margin: 0;
        }

        .sidebar-links li a {
            display: block;
            color: var(--text-light);
            text-decoration: none;
            padding: 12px 20px 12px 30px;
            font-size: 1.05em;
        }

        /* Hero Section */
        .hero {
            text-align: center;
            padding: 25px 20px 40px 20px; 
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }

        .hero h1 {
            margin: 0;
            font-size: 2.2em;
            letter-spacing: 1px;
        }

        .hero p {
            color: #cccccc;
            margin-top: 5px;
            font-size: 0.9em;
        }

        /* Container & Titles */
        .container {
            max-width: 900px;
            margin: 0 auto;
            padding: 30px 15px; 
        }

        /* Filter Buttons */
        .filter-container {
            text-align: center;
            margin-bottom: 30px;
        }

        .filter-btn {
            background-color: transparent;
            color: var(--text-light);
            border: 2px solid var(--accent-yellow);
            padding: 6px 15px;
            margin: 0 3px;
            cursor: pointer;
            font-size: 0.85em; 
            border-radius: 30px; 
            outline: none;
        }

        .filter-btn.active {
            background-color: var(--accent-yellow);
            color: var(--primary-blue);
            font-weight: bold;
        }

        /* --- STRICTLY 2 PER ROW GALLERY GRID --- */
        .gallery-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr); /* Laging dalawa */
            gap: 15px; 
            margin-bottom: 50px;
        }

        .media-card {
            background-color: rgba(255, 255, 255, 0.03);
            border-radius: 6px; 
            overflow: hidden;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.4);
            display: flex;
            flex-direction: column;
            animation: fadeIn 0.5s ease-in-out;
        }

        .media-card.hidden {
            display: none;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: scale(0.95); }
            to { opacity: 1; transform: scale(1); }
        }

        .media-content-wrap {
            overflow: hidden;
            position: relative;
            background-color: #000;
        }

        /* --- MALIIT LANG NA SIZE PARA SAKTO SA CELLPHONE --- */
        .media-card img, .media-card video {
            width: 100%;
            height: 130px; /* Eksakto lang na taas, hindi banat, hindi masyadong maliit */
            object-fit: cover; 
            display: block;
        }

        .media-caption {
            padding: 10px;
            text-align: center;
            font-size: 0.8em; 
            color: var(--text-light);
            border-top: 1px solid rgba(255, 255, 255, 0.05);
            white-space: nowrap; 
            overflow: hidden;
            text-overflow: ellipsis; 
        }

        /* Footer */
        footer {
            text-align: center;
            padding: 30px 20px;
            background-color: #07132b;
            margin-top: 40px;
        }
    </style>
</head>
<body>

    <header>
        Welcome to our Official Section Website! | S.Y. 2025-2026
    </header>

    <div class="menu-bar">
        <div class="menu-icon" id="menuToggle" title="Menu">
            <span></span>
            <span></span>
            <span></span>
        </div>
    </div>

    <div class="sidebar" id="sidebar">
        <div class="close-btn" id="closeBtn">&times;</div>
        <ul class="sidebar-links">
            <li><a href="index.html">Home</a></li>
            <li><a href="gallery.html">Gallery</a></li>
            <li><a href="about.html">About</a></li>
        </ul>
    </div>

    <div class="hero">
        <h1>OUR GALLERY</h1>
        <p>Memories of Grade 7 Paterno</p>
    </div>

    <div class="container">
        
        <div class="filter-container">
            <button class="filter-btn active" data-filter="all">All</button>
            <button class="filter-btn" data-filter="photo">Photos</button>
            <button class="filter-btn" data-filter="video">Videos</button>
        </div>

        <div class="gallery-grid" id="galleryGrid">
            
            <div class="media-card" data-category="photo">
                <div class="media-content-wrap">
                    <img src="photos/first-day.jpg" alt="First Day of Classes">
                </div>
                <div class="media-caption">First Day</div>
            </div>

            <div class="media-card" data-category="photo">
                <div class="media-content-wrap">
                    <img src="photos/buwan-ng-wika.jpg" alt="Buwan ng Wika">
                </div>
                <div class="media-caption">Buwan ng Wika</div>
            </div>

            <div class="media-card" data-category="video">
                <div class="media-content-wrap">
                    <video controls>
                        <source src="videos/dance-presentation.mp4" type="video/mp4">
                    </video>
                </div>
                <div class="media-caption">Dance Pres</div>
            </div>

            <div class="media-card" data-category="photo">
                <div class="media-content-wrap">
                    <img src="photos/science-group.jpg" alt="Science Group">
                </div>
                <div class="media-caption">Science Group</div>
            </div>

            <div class="media-card" data-category="video">
                <div class="media-content-wrap">
                    <video controls>
                        <source src="videos/intramurals.mp4" type="video/mp4">
                    </video>
                </div>
                <div class="media-caption">Intramurals</div>
            </div>

            <div class="media-card" data-category="photo">
                <div class="media-content-wrap">
                    <img src="photos/xmas-party.jpg" alt="Christmas Party">
                </div>
                <div class="media-caption">Xmas Party</div>
            </div>

        </div>

    </div>

    <footer>
    </footer>

    <script>
        document.addEventListener("DOMContentLoaded", function() {
            // JS FOR MENU TOGGLE
            const menuToggle = document.getElementById('menuToggle');
            const sidebar = document.getElementById('sidebar');
            const closeBtn = document.getElementById('closeBtn');

            menuToggle.addEventListener('click', function() {
                sidebar.classList.add('active');
            });

            closeBtn.addEventListener('click', function() {
                sidebar.classList.remove('active');
            });

            // JS FOR FILTERING PHOTOS & VIDEOS
            const filterBtns = document.querySelectorAll('.filter-btn');
            const mediaCards = document.querySelectorAll('.media-card');

            filterBtns.forEach(btn => {
                btn.addEventListener('click', () => {
                    document.querySelector('.filter-btn.active').classList.remove('active');
                    btn.classList.add('active');
                    
                    const filterValue = btn.getAttribute('data-filter');
                    
                    mediaCards.forEach(card => {
                        if (filterValue === 'all' || card.getAttribute('data-category') === filterValue) {
                            card.classList.remove('hidden');
                        } else {
                            card.classList.add('hidden');
                        }
                    });
                });
            });
        });
    </script>
</body>
</html>
